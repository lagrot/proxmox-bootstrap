# ------------------------------------------------------------
# Global defaults
# ------------------------------------------------------------

PROXMOX_BRIDGE="vmbr0"
PROXMOX_TEMPLATE_STORAGE="local"
PROXMOX_CT_STORAGE="local-lvm"

# ------------------------------------------------------------
# Frigate storage
# ------------------------------------------------------------

FRIGATE_MOUNTPOINT="/mnt/frigate"
FRIGATE_FILESYSTEM="xfs"
FRIGATE_DEVICE_BY_ID="/dev/disk/by-id/ata-PNY_500GB_SATA_SSD_PNH05266000310302979-part1"

# ------------------------------------------------------------
# Docker core LXC
# ------------------------------------------------------------

DOCKER_CT_ID="200"
DOCKER_CT_HOSTNAME="docker-core"
DOCKER_CT_TEMPLATE_FILE="debian-13-standard_13.1-2_amd64.tar.zst"
DOCKER_CT_ROOTFS_SIZE="16"
DOCKER_CT_MEMORY_MB="4096"
DOCKER_CT_SWAP_MB="512"
DOCKER_CT_CORES="4"
DOCKER_CT_IP_CONFIG="dhcp"
DOCKER_CT_UNPRIVILEGED="1"
DOCKER_CT_ONBOOT="1"
DOCKER_CT_FEATURES="nesting=1,keyctl=1"
DOCKER_CT_MOUNTPOINT_MP0="/mnt/frigate,mp=/mnt/frigate"

# ------------------------------------------------------------
# Home Assistant VM
# ------------------------------------------------------------

HA_VM_ID="100"
HA_VM_NAME="homeassistant"
HA_HTTP_PORT="8123"

# ------------------------------------------------------------
# MQTT LXC
# ------------------------------------------------------------

MQTT_CT_ID="210"
MQTT_CT_HOSTNAME="mqtt-core"
MQTT_PORT="1883"

# ------------------------------------------------------------
# Frigate / Docker core
# ------------------------------------------------------------

FRIGATE_APP_DIR="/opt/frigate"
FRIGATE_CONFIG_DIR="/opt/frigate/config"
FRIGATE_CONFIG_FILE="/opt/frigate/config/config.yml"
FRIGATE_WEB_PORT="8971"
FRIGATE_INTERNAL_PORT="5000"

# Hermes Agent LXC defaults
HERMES_CT_ID="220"
HERMES_CT_HOSTNAME="hermes-agent"
HERMES_CT_MEMORY_MB="4096"
HERMES_CT_SWAP_MB="0"
HERMES_CT_CORES="2"
HERMES_CT_CPUUNITS="2048"
HERMES_CT_FEATURES="nesting=1,keyctl=1"
